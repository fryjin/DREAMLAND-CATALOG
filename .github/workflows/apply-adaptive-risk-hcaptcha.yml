name: Apply adaptive risk and hCaptcha

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-adaptive-risk-hcaptcha.yml"
      - "scripts/apply-adaptive-risk-hcaptcha.mjs"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Verify patch files
        run: |
          set -euxo pipefail
          node --version
          test -f scripts/apply-adaptive-risk-hcaptcha.mjs
          test -f index.html
          test -f sw.js
          test -f data/app-config.json
          wc -l scripts/apply-adaptive-risk-hcaptcha.mjs

      - name: Apply adaptive risk control
        env:
          NODE_OPTIONS: "--trace-uncaught"
        run: |
          set -o pipefail
          node scripts/apply-adaptive-risk-hcaptcha.mjs

      - name: Validate adaptive risk control
        env:
          NODE_OPTIONS: "--trace-uncaught"
        run: |
          set -o pipefail
          node scripts/validate-adaptive-risk-hcaptcha.mjs

      - name: Commit generated changes
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add adaptive risk-based hCaptcha submission"
            git push origin HEAD:main
          fi
