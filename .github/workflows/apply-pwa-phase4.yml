name: Apply PWA phase 4

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-pwa-phase4.yml"
      - "scripts/apply-pwa-phase4.mjs"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply PWA phase 4
        run: node scripts/apply-pwa-phase4.mjs

      - name: Validate PWA phase 4
        run: node scripts/validate-pwa-phase4.mjs

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Complete PWA install update and offline experience"
            git push origin HEAD:main
          fi
